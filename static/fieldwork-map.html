<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fieldwork Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
html, body, #map { height:100%; margin:0; }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

const locations = [
  ["Trim, Ireland", 53.555, -6.791],
  ["McMurdo Station, Antarctica", -77.84, 166.68],
  ["Menorca, Spain", 39.95, 4.11],
  ["Saratoga Springs, NY", 43.083, -73.784]
];

const bounds = [];

locations.forEach(loc => {
  L.marker([loc[1], loc[2]]).addTo(map).bindPopup(loc[0]);
  bounds.push([loc[1], loc[2]]);
});

map.fitBounds(bounds, {padding:[40,40]});
</script>
</body>
</html>
