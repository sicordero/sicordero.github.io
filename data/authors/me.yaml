      * Technical Support: geophysical data processing; radar data interpretation; proofreading and copywriting (website text, abstracts, publications, listserv communication, event advertisement)
      * Field Cargo Logistics Support: logistics planning, cargo shipping, liason to Shipping & Receiving Coordinators at LDEO, USAP, BAS, and instrument manufacturers; Antarctic Treaty instrument & field compliance       

