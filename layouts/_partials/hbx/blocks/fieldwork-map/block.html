{{ $block := . }}

<section class="fieldwork-map-block">

  <h2>{{ $block.content.title }}</h2>

  <div id="fieldwork-map" style="height: {{ $block.content.height | default "500px" }}"></div>

  <script id="fieldwork-data" type="application/json">
  [
  {{- $pages := where site.RegularPages "Section" "fieldwork" -}}
  {{- $first := true -}}
  {{- range $p := $pages -}}
    {{- if and $p.Params.lat $p.Params.lng -}}
      {{- if not $first }},{{ end }}
      {
        "title": {{ $p.Title | jsonify }},
        "lat": {{ $p.Params.lat }},
        "lng": {{ $p.Params.lng }},
        "date": {{ $p.Params.date }},
        "url": {{ $p.RelPermalink | jsonify }}
      }
      {{- $first = false -}}
    {{- end -}}
  {{- end -}}
  ]
  </script>

</section>
