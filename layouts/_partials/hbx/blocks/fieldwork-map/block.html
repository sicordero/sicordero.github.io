{{ $block := . }}
{{ $title := $block.content.title | default "Field Locations" }}

<section class="fieldwork-map-block p-6">

  {{ if $title }}
    <h2 class="text-2xl font-bold mb-4">{{ $title }}</h2>
  {{ end }}

  <div id="fieldwork-map" style="height: 500px;"></div>

  <!-- JSON data from fieldwork pages -->
  <script id="fieldwork-data" type="application/json">
  [
  {{- $pages := where site.RegularPages "Section" "fieldwork" -}}
  {{- $first := true -}}
  {{- range $p := $pages -}}
    {{- if and $p.Params.lat $p.Params.lng -}}
      {{- if not $first }},{{ end }}
      {
        "title": {{ $p.Title | jsonify }},
        "lat": {{ $p.Params.lat }},
        "lng": {{ $p.Params.lng }},
        "location": {{ $p.Params.location | jsonify }},
        "url": {{ $p.RelPermalink | jsonify }}
      }
      {{- $first = false -}}
    {{- end -}}
  {{- end -}}
  ]
  </script>

</section>
